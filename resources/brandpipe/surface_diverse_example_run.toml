[run]
title = "surface-diverse-example"
db_path = "../../test_outputs/brandpipe/surface_diverse_example.db"

[brief]
product_core = "incident response signal coordination software"
target_users = ["operators", "responders"]
trust_signals = ["clarity", "speed", "composure"]
language_market = "global"
notes = "Explore multiple naming families without collapsing everything into one smooth invented-word lane."

[ideation]
provider = "fixture"
fixture_input = "example_fixture.json"
family_mix_profile = "surface_diverse_v2"
family_llm_retry_limit = 2
late_fusion_min_per_family = 1
family_quotas = { literal_tld_hack = 4, smooth_blend = 4, mascot_mutation = 4, contrarian_dictionary = 4, brutalist_utility = 4 }

[validation]
checks = ["tm_cheap"]

[export]
out_csv = "../../test_outputs/brandpipe/surface_diverse_finalists_{run_id}.csv"
top_n = 20
