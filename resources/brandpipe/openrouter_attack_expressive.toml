[run]
title = "openrouter-attack-expressive"
db_path = "../../test_outputs/brandpipe/attack_expressive/brandpipe.db"

[brief]
product_core = "placeholder"

[ideation]
provider = "openrouter_http"
rounds = 8
candidates_per_round = 24
overgenerate_factor = 3.2
round_seed_min = 8
round_seed_max = 14
seed_pool_multiplier = 16
seed_saturation_limit = 2
per_family_cap = 4
lexicon_core_limit = 10
lexicon_modifier_limit = 10
lexicon_associative_limit = 12
lexicon_morpheme_limit = 18
local_filter_saturation_limit = 2
local_filter_lead_fragment_limit = 1
local_filter_lead_fragment_length = 4
local_filter_lead_skeleton_limit = 2
temperature = 0.92
timeout_ms = 60000
api_key_env = "OPENROUTER_API_KEY"
prompt_template_file = "../branding/llm/llm_prompt.broadside_expressive_long_v1.txt"

[ideation.pseudoword]
language_plugin = "orthographic_italian"
language_plugins = ["orthographic_italian", "orthographic_french", "orthographic_spanish"]
seed_count = 42

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "creative_divergence"
temperature = 0.98
weight = 3

[[ideation.roles]]
model = "anthropic/claude-sonnet-4.5"
role = "phonetic_explorer"
temperature = 0.95
weight = 1

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "ending_diversifier"
temperature = 0.92
weight = 1

[[ideation.roles]]
model = "anthropic/claude-sonnet-4.5"
role = "morpheme_hybridizer"
temperature = 0.86
weight = 1

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "contrarian"
temperature = 0.98
weight = 2

[validation]
checks = "domain,package,web,social"
parallel_workers = 4
scope = "global"
store_countries = "de,ch,it"
web_search_order = "brave,google_cse,duckduckgo"

[export]
out_csv = "../../test_outputs/brandpipe/attack_expressive/finalists_{run_id}.csv"
top_n = 80
