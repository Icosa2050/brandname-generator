[run]
title = "openrouter-broadside-short"
db_path = "../../test_outputs/brandpipe/broadside_short/brandpipe.db"

[brief]
product_core = "placeholder"

[ideation]
provider = "openrouter_http"
rounds = 8
candidates_per_round = 20
overgenerate_factor = 3.0
round_seed_min = 6
round_seed_max = 12
seed_pool_multiplier = 12
seed_saturation_limit = 2
per_family_cap = 4
lexicon_core_limit = 8
lexicon_modifier_limit = 8
lexicon_associative_limit = 8
lexicon_morpheme_limit = 14
local_filter_saturation_limit = 2
temperature = 0.9
timeout_ms = 60000
api_key_env = "OPENROUTER_API_KEY"
prompt_template_file = "../branding/llm/llm_prompt.broadside_short_coined_v1.txt"

[ideation.pseudoword]
language_plugin = "orthographic_english"
seed_count = 30

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "contrarian"
temperature = 1.0
weight = 2

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "phonetic_explorer"
temperature = 1.05
weight = 2

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "ending_diversifier"
temperature = 0.9
weight = 1

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "morpheme_hybridizer"
temperature = 0.85
weight = 1

[validation]
checks = "domain,package,web,social"
scope = "global"
store_countries = "de,ch,it"
web_search_order = "brave,google_cse,duckduckgo"

[export]
out_csv = "../../test_outputs/brandpipe/broadside_short/finalists_{run_id}.csv"
top_n = 60
