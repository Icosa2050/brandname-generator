[run]
title = "openrouter-batch-large"
db_path = "../../test_outputs/brandpipe/batch_runs/brandpipe.db"

[brief]
product_core = "placeholder"

[ideation]
provider = "openrouter_http"
rounds = 1
candidates_per_round = 4
overgenerate_factor = 2.0
temperature = 0.8
timeout_ms = 45000
api_key_env = "OPENROUTER_API_KEY"

[ideation.pseudoword]
language_plugin = "orthographic_english"
seed_count = 16

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "creative_divergence"
temperature = 0.95
weight = 2

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "recombinator"
temperature = 0.75
weight = 1

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "contrarian"
temperature = 0.7
weight = 1

[validation]
checks = "domain,package,web,social,tmview"
scope = "global"
store_countries = "de,ch,it"
web_search_order = "brave,google_cse,duckduckgo"
tmview_profile_dir = "../../test_outputs/brandpipe/tmview-edge-profile"
tmview_chrome_executable = "/Applications/Microsoft Edge.app/Contents/MacOS/Microsoft Edge"

[export]
out_csv = "../../test_outputs/brandpipe/batch_runs/finalists_{run_id}.csv"
top_n = 12
