[run]
title = "openrouter-attack-angular"
db_path = "../../test_outputs/brandpipe/attack_angular/brandpipe.db"

[brief]
product_core = "placeholder"

[ideation]
provider = "openrouter_http"
rounds = 9
candidates_per_round = 24
overgenerate_factor = 3.2
round_seed_min = 8
round_seed_max = 14
seed_pool_multiplier = 16
seed_saturation_limit = 2
per_family_cap = 4
lexicon_core_limit = 8
lexicon_modifier_limit = 8
lexicon_associative_limit = 8
lexicon_morpheme_limit = 14
local_filter_saturation_limit = 2
local_filter_lead_fragment_limit = 1
local_filter_lead_fragment_length = 4
local_filter_lead_skeleton_limit = 2
temperature = 0.96
timeout_ms = 60000
api_key_env = "OPENROUTER_API_KEY"
prompt_template_file = "../branding/llm/llm_prompt.attack_angular_v1.txt"

[ideation.pseudoword]
language_plugin = "orthographic_dutch"
language_plugins = ["orthographic_dutch", "orthographic_german", "orthographic_polish"]
seed_count = 42

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "contrarian"
temperature = 1.0
weight = 2

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "phonetic_explorer"
temperature = 1.02
weight = 2

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "ending_diversifier"
temperature = 0.9
weight = 1

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "morpheme_hybridizer"
temperature = 0.86
weight = 1

[validation]
checks = "domain,package,web,social"
parallel_workers = 4
scope = "global"
store_countries = "de,ch,it"
web_search_order = "brave,browser_google"

[export]
out_csv = "../../test_outputs/brandpipe/attack_angular/finalists_{run_id}.csv"
top_n = 80
