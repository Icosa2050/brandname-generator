[run]
title = "openrouter-broadside-balanced"
db_path = "../../test_outputs/brandpipe/broadside_balanced/brandpipe.db"

[brief]
product_core = "placeholder"

[ideation]
provider = "openrouter_http"
rounds = 6
candidates_per_round = 18
overgenerate_factor = 2.8
round_seed_min = 6
round_seed_max = 10
seed_pool_multiplier = 12
seed_saturation_limit = 2
per_family_cap = 4
lexicon_core_limit = 10
lexicon_modifier_limit = 10
lexicon_associative_limit = 10
lexicon_morpheme_limit = 16
local_filter_saturation_limit = 2
temperature = 0.85
timeout_ms = 60000
api_key_env = "OPENROUTER_API_KEY"
prompt_template_file = "../branding/llm/llm_prompt.broadside_balanced_v1.txt"

[ideation.pseudoword]
language_plugin = "orthographic_english"
seed_count = 28

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "creative_divergence"
temperature = 0.95
weight = 2

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "recombinator"
temperature = 0.75
weight = 2

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "contrarian"
temperature = 1.0
weight = 1

[[ideation.roles]]
model = "google/gemini-3.1-pro-preview"
role = "phonetic_explorer"
temperature = 1.0
weight = 1

[[ideation.roles]]
model = "moonshotai/kimi-k2.5"
role = "morpheme_hybridizer"
temperature = 0.85
weight = 1

[validation]
checks = "domain,package,web,social"
scope = "global"
store_countries = "de,ch,it"
web_search_order = "brave,google_cse,duckduckgo"

[export]
out_csv = "../../test_outputs/brandpipe/broadside_balanced/finalists_{run_id}.csv"
top_n = 60
