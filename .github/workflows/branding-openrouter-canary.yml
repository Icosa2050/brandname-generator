name: Branding OpenRouter Canary

on:
  workflow_dispatch:
    inputs:
      model:
        description: OpenRouter model id
        required: false
        default: mistralai/mistral-small-creative
  schedule:
    - cron: '30 2 * * *'

concurrency:
  group: branding-openrouter-canary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openrouter_canary:
    name: OpenRouter Live Canary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ github.event.inputs.model || 'mistralai/mistral-small-creative' }}

    steps:
      - name: Check OpenRouter Secret
        id: preflight
        shell: bash
        run: |
          if [[ -n "${OPENROUTER_API_KEY:-}" ]]; then
            echo "has_openrouter_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_openrouter_key=false" >> "$GITHUB_OUTPUT"
            echo "OPENROUTER_API_KEY is not configured; skipping live canary."
            if [[ "${GITHUB_EVENT_NAME:-}" == "schedule" && "${GITHUB_REPOSITORY:-}" == "Icosa2050/brandname-generator" ]]; then
              echo "Scheduled run on canonical repository without OPENROUTER_API_KEY; failing job."
              exit 1
            fi
          fi

      - name: Checkout Repository
        if: ${{ steps.preflight.outputs.has_openrouter_key == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ steps.preflight.outputs.has_openrouter_key == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OpenRouter Canary
        if: ${{ steps.preflight.outputs.has_openrouter_key == 'true' }}
        run: |
          python3 scripts/branding/naming_campaign_runner.py \
            --max-runs 1 \
            --sleep-s 0 \
            --no-mini-test \
            --pool-size 400 \
            --check-limit 80 \
            --validator-candidate-limit 40 \
            --validator-expensive-finalist-limit 20 \
            --validator-concurrency 8 \
            --validator-min-concurrency 4 \
            --validator-max-concurrency 12 \
            --validator-timeout-s 6 \
            --generator-no-external-checks \
            --llm-ideation-enabled \
            --llm-provider openrouter_http \
            --llm-model "$OPENROUTER_MODEL" \
            --llm-openrouter-http-referer "https://github.com/Icosa2050/brandname-generator" \
            --llm-openrouter-x-title "brand-name-generator" \
            --llm-context-file resources/branding/llm/llm_context.example.json \
            --llm-rounds 1 \
            --llm-candidates-per-round 10 \
            --llm-max-call-latency-ms 30000 \
            --llm-stage-timeout-ms 60000 \
            --llm-max-retries 1 \
            --llm-max-usd-per-run 0.25 \
            --out-dir /tmp/branding_openrouter_canary

      - name: Assert Canary Produced LLM Candidates
        if: ${{ steps.preflight.outputs.has_openrouter_key == 'true' }}
        run: |
          python3 - <<'PY'
          import csv
          from pathlib import Path

          progress = Path('/tmp/branding_openrouter_canary/campaign_progress.csv')
          assert progress.exists(), f'missing {progress}'
          row = next(csv.DictReader(progress.open('r', encoding='utf-8', newline='')))
          count = int(float(row.get('llm_candidate_count') or 0))
          status = row.get('llm_stage_status') or ''
          if count <= 0 or status != 'ok':
              raise SystemExit(f'canary failed: llm_candidate_count={count} llm_stage_status={status}')
          print(f'canary ok: model={row.get("llm_model")} count={count} status={status}')
          PY

      - name: Assert Canary Artifact Contract
        if: ${{ steps.preflight.outputs.has_openrouter_key == 'true' }}
        run: |
          python3 - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path('/tmp/branding_openrouter_canary')
          summary_path = root / 'campaign_summary.json'
          progress_path = root / 'campaign_progress.csv'
          runs_dir = root / 'runs'
          logs_dir = root / 'logs'

          summary = json.loads(summary_path.read_text(encoding='utf-8'))
          rows = list(csv.DictReader(progress_path.open('r', encoding='utf-8', newline='')))
          if not rows:
              raise SystemExit('missing progress rows')

          run_artifacts = sorted(runs_dir.glob('run_*.json'))
          if not run_artifacts:
              raise SystemExit('missing candidate artifact run_*.json')

          validator_logs = sorted(logs_dir.glob('run_*_validator.log'))
          if not validator_logs:
              raise SystemExit('missing validator logs')
          has_run_summary = any(
              'run_summary=' in path.read_text(encoding='utf-8', errors='replace')
              for path in validator_logs
          )
          if not has_run_summary:
              raise SystemExit('validator summary not found in validator logs')

          heartbeat_path = Path(str(summary.get('heartbeat_jsonl') or ''))
          if not heartbeat_path.exists():
              raise SystemExit(f'missing heartbeat snapshot: {heartbeat_path}')
          heartbeat_text = heartbeat_path.read_text(encoding='utf-8', errors='replace')
          for marker in ('"event": "campaign_start"', '"event": "campaign_complete"'):
              if marker not in heartbeat_text:
                  raise SystemExit(f'missing heartbeat marker {marker}')

          first = rows[0]
          cost = float(first.get('llm_cost_usd') or 0.0)
          if cost > 0.26:
              raise SystemExit(f'cost cap exceeded: llm_cost_usd={cost}')

          print(
              f'canary artifact contract ok: model={first.get("llm_model")} '
              f'cost={cost:.4f} candidates={len(run_artifacts)} heartbeat={heartbeat_path}'
          )
          PY

      - name: Upload Canary Artifacts
        if: ${{ always() && steps.preflight.outputs.has_openrouter_key == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: branding-openrouter-canary-${{ github.run_id }}
          path: /tmp/branding_openrouter_canary
          if-no-files-found: ignore
          retention-days: 4
