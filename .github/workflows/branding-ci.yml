name: Branding CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'scripts/branding/**'
      - 'docs/branding/**'
      - '.github/workflows/branding-ci.yml'
      - '.github/workflows/branding-openrouter-canary.yml'
  workflow_dispatch:

concurrency:
  group: branding-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branding_checks:
    name: Branding Deterministic Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ruff

      - name: Python Syntax Check
        run: |
          python3 -m py_compile \
            scripts/branding/name_generator.py \
            scripts/branding/name_ideation_ingest.py \
            scripts/branding/naming_ideation_stage.py \
            scripts/branding/naming_campaign_runner.py

      - name: Ruff Check
        run: ruff check scripts/branding

      - name: Ideation Stage Unit Tests
        run: python3 scripts/branding/test_naming_ideation_stage.py

      - name: Generator Unit Tests
        run: python3 scripts/branding/test_name_generator.py

      - name: Fixture Campaign Smoke
        run: |
          cat > /tmp/branding_fixture_candidates.json <<'JSON'
          {
            "candidates": [
              {"name": "verodomo"},
              {"name": "settlix"},
              {"name": "equinome"},
              {"name": "clarivio"},
              {"name": "novanta"},
              {"name": "lumedio"}
            ]
          }
          JSON

          python3 scripts/branding/naming_campaign_runner.py \
            --max-runs 1 \
            --sleep-s 0 \
            --no-mini-test \
            --pool-size 400 \
            --check-limit 80 \
            --validator-candidate-limit 40 \
            --validator-expensive-finalist-limit 20 \
            --generator-no-external-checks \
            --llm-ideation-enabled \
            --llm-provider fixture \
            --llm-fixture-input /tmp/branding_fixture_candidates.json \
            --llm-context-file resources/branding/llm/llm_context.example.json \
            --llm-rounds 1 \
            --llm-candidates-per-round 6 \
            --out-dir /tmp/branding_ci_smoke

      - name: Verify Smoke Output
        run: |
          test -f /tmp/branding_ci_smoke/campaign_summary.json
          test -f /tmp/branding_ci_smoke/campaign_progress.csv

      - name: Verify Smoke Artifact Contract
        run: |
          python3 - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path('/tmp/branding_ci_smoke')
          summary_path = root / 'campaign_summary.json'
          progress_path = root / 'campaign_progress.csv'
          runs_dir = root / 'runs'
          logs_dir = root / 'logs'

          summary = json.loads(summary_path.read_text(encoding='utf-8'))
          rows = list(csv.DictReader(progress_path.open('r', encoding='utf-8', newline='')))
          if not rows:
              raise SystemExit('missing progress rows')
          if int(summary.get('runs_executed', 0)) < 1:
              raise SystemExit(f'invalid runs_executed={summary.get("runs_executed")}')

          run_artifacts = sorted(runs_dir.glob('run_*.json'))
          if not run_artifacts:
              raise SystemExit('missing candidate artifact run_*.json')

          validator_logs = sorted(logs_dir.glob('run_*_validator.log'))
          if not validator_logs:
              raise SystemExit('missing validator logs')
          has_run_summary = any(
              'run_summary=' in path.read_text(encoding='utf-8', errors='replace')
              for path in validator_logs
          )
          if not has_run_summary:
              raise SystemExit('validator summary not found in validator logs')

          heartbeat_path = Path(str(summary.get('heartbeat_jsonl') or ''))
          if not heartbeat_path.exists():
              raise SystemExit(f'missing heartbeat snapshot: {heartbeat_path}')
          heartbeat_text = heartbeat_path.read_text(encoding='utf-8', errors='replace')
          for marker in ('"event": "campaign_start"', '"event": "campaign_complete"'):
              if marker not in heartbeat_text:
                  raise SystemExit(f'missing heartbeat marker {marker}')

          print(
              f'smoke artifact contract ok: candidates={len(run_artifacts)} '
              f'validator_logs={len(validator_logs)} heartbeat={heartbeat_path}'
          )
          PY

      - name: Upload Branding Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branding-ci-smoke-${{ github.run_id }}
          path: /tmp/branding_ci_smoke
          if-no-files-found: ignore
          retention-days: 14
